---
layout: default
---

<article>
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.tags.size > 0 %} &middot; {% for tag in page.tags %}<span class="tag tag-pink">{{ tag }}</span>{% unless forloop.last %} {% endunless %}{% endfor %}{% endif %}</p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <a class="back-link" href="{{ '/posts' | relative_url }}">← all posts</a>
</article>
